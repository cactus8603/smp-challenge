seed: 42
exp_name: text_meta_cross_v1

data:
  train_path: data/processed/train.parquet
  val_path: data/processed/val.parquet

model:
  use_text: true
  use_meta: true
  use_image: false
  hidden_dim: 256
  dropout: 0.1

text:
  model_name: openai/clip-vit-base-patch32
  max_length: 77
  pooling: clip
  trainable: false

meta:
  branch_dim: 128

image:
  model_name: resnet50
  pretrained: true
  trainable: true

fusion:
  type: cross_feature

loss:
  name: smoothl1

train:
  batch_size: 16
  num_workers: 4
  pin_memory: true
  epochs: 8
  lr: 2.0e-5
  weight_decay: 1.0e-2
  grad_clip_norm: 1.0

output:
  root_dir: outputs

preprocess:
  num_cols: null
  cat_cols: null
  bin_cols: null
  log1p_cols: null
